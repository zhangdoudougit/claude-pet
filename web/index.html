<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>泡沫</title>
<link rel="stylesheet" href="app.css" />
</head>
<body class="theme-warm">
  <div id="app">
    <!-- 标题栏由 PyQt 自绘, 这里只是占位 (透明区让原生 chrome 露出) -->
    <div class="title-spacer"></div>

    <div class="main-row">
      <!-- ===== sidebar ===== -->
      <aside class="sidebar">
        <div class="sidebar-search-row">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
            </svg>
            <input id="search-input" type="text" placeholder="搜索 / 切换项目" />
          </div>
          <button id="add-btn" class="add-btn" title="添加项目">+</button>
        </div>

        <div class="section-label">最近</div>
        <div id="conv-list" class="conv-list"></div>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-footer">
          <button id="settings-btn" class="settings-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
            </svg>
            <span>设置</span>
          </button>
          <button id="memory-btn" class="memory-btn" title="泡沫 · 记忆">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <path d="M12 2a4 4 0 0 0-4 4v1a4 4 0 0 0-1 7.9V18a4 4 0 0 0 8 0v-3.1A4 4 0 0 0 14 7V6a4 4 0 0 0-2-4z"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- ===== main chat ===== -->
      <main class="main">
        <header class="chat-header">
          <div id="header-avatar" class="header-avatar"></div>
          <div class="header-text">
            <div class="header-title-row">
              <span id="header-title" class="header-title">泡沫</span>
              <span id="header-subtitle" class="header-subtitle">· 桌面伙伴</span>
            </div>
            <div id="header-mood" class="header-mood">正在和你聊点设计 · 心情 <b>松弛</b></div>
          </div>
          <div id="model-dd" class="header-dd" title="模型 — 每会话独立保存" tabindex="0">
            <span class="header-dd-value"></span>
            <span class="header-dd-arrow">▾</span>
          </div>
          <div id="perm-dd" class="header-dd" title="工具调用权限策略 — 改动立即生效" tabindex="0">
            <span class="header-dd-value"></span>
            <span class="header-dd-arrow">▾</span>
          </div>
          <div id="status-pill" class="status-pill status-idle">
            <span class="status-dot"></span>
            <span class="status-text">待机</span>
          </div>
          <button class="icon-btn" id="more-btn" title="更多">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/>
            </svg>
          </button>
        </header>

        <div id="chat-body" class="chat-body">
          <!-- 消息流由 JS 渲染 -->
        </div>

        <footer class="composer">
          <div class="composer-card">
            <div id="paste-strip" class="paste-strip" hidden></div>
            <textarea id="composer-input" class="composer-input" placeholder="和泡沫说点什么… (粘贴或拖入图片即可附图)" rows="1"></textarea>
            <div class="composer-divider"></div>
            <div class="composer-tools">
              <button id="attach-btn" class="icon-btn" title="附件 — 粘贴或拖入图片">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                  <path d="m21.4 11.5-8.5 8.5a5 5 0 0 1-7-7l8.5-8.5a3.5 3.5 0 0 1 5 5l-8.5 8.5a2 2 0 0 1-3-3l7.5-7.5"/>
                </svg>
              </button>
              <input id="attach-file-input" type="file" accept="image/*" multiple hidden />
              <button class="icon-btn" title="@提及 (尚未接入)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                  <circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/>
                </svg>
              </button>
              <button class="icon-btn" title="代码块 (尚未接入)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                  <path d="m8 7-5 5 5 5M16 7l5 5-5 5"/>
                </svg>
              </button>
              <div class="composer-spacer"></div>
              <span class="kbd-hint">
                <code>↵</code> 发送 · <code>⇧↵</code> 换行
              </span>
              <button id="send-btn" class="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
                <span>发送</span>
              </button>
            </div>
          </div>
        </footer>
      </main>
    </div>
  </div>

  <!-- Qt 自带的 webchannel.js 走 qrc URL -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="app.js"></script>
</body>
</html>
